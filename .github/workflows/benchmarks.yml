name: Cross-platform benchmarks

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  MATURIN_VERSION: "1.14.0"
  NUMPY_VERSION: "2.4.6"
  SCIKIT_LEARN_VERSION: "1.9.0"
  SCIPY_VERSION: "1.17.1"

jobs:
  linear-models:
    name: Linear models - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b
        with:
          maturin-version: ${{ env.MATURIN_VERSION }}
          command: build
          args: --release --out dist
      - shell: bash
        run: |
          python -m pip install \
            "numpy==${NUMPY_VERSION}" \
            "scikit-learn==${SCIKIT_LEARN_VERSION}" \
            "scipy==${SCIPY_VERSION}"
          python -m pip install --no-deps dist/*.whl
      - shell: bash
        run: python benches/benchmark_linear_models.py --repetitions 3 --warmups 2 | tee linear-models-${{ runner.os }}.txt
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: linear-models-${{ runner.os }}
          path: linear-models-${{ runner.os }}.txt
          if-no-files-found: warn
