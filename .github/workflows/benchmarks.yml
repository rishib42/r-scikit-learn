name: Cross-platform benchmarks

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

env:
  MATURIN_VERSION: "1.14.0"

jobs:
  linear-models:
    name: Linear models - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - run: python -m pip install "maturin==${MATURIN_VERSION}" ".[dev]"
      - run: maturin develop --release
      - shell: bash
        run: python benches/benchmark_linear_models.py --repetitions 3 --warmups 2 | tee linear-models-${{ runner.os }}.txt
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: linear-models-${{ runner.os }}
          path: linear-models-${{ runner.os }}.txt
