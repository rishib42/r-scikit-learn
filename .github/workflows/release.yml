name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version from pyproject.toml, without the v prefix
        required: true
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  MATURIN_VERSION: "1.14.0"
  PACKAGING_VERSION: "26.2"
  TWINE_VERSION: "6.2.0"

jobs:
  prepare:
    name: Validate release request
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
      - id: version
        shell: bash
        run: |
          test "$GITHUB_REF" = "refs/heads/main"
          package_version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          core_version="$(python -c 'import tomllib; print(tomllib.load(open("Cargo.toml", "rb"))["package"]["version"])')"
          api_version="$(sed -n 's/^__version__ = "\(.*\)"/\1/p' python/rsklearn/__init__.py)"
          test "$package_version" = "${{ inputs.version }}"
          test "$core_version" = "${{ inputs.version }}"
          test "$api_version" = "${{ inputs.version }}"
          grep -F "## ${{ inputs.version }}" CHANGELOG.md
          tag="v${{ inputs.version }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists; release versions are immutable." >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  sdist:
    name: Build source distribution
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b
        with:
          maturin-version: ${{ env.MATURIN_VERSION }}
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: source-distribution
          path: dist

  wheels-linux:
    name: Build manylinux wheels
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b
        with:
          maturin-version: ${{ env.MATURIN_VERSION }}
          command: build
          args: --release --out dist --find-interpreter
          manylinux: auto
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: wheels-ubuntu-latest
          path: dist

  wheels-native:
    name: Build native wheel - Python ${{ matrix.python-version }} / ${{ matrix.os }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}
      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b
        with:
          maturin-version: ${{ env.MATURIN_VERSION }}
          command: build
          args: --release --out dist
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.python-version }}
          path: dist

  wheel-install-linux:
    name: Install manylinux wheel - Python ${{ matrix.python-version }}
    needs: wheels-linux
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: wheels-ubuntu-latest
          path: dist
      - run: python -m pip install numpy scipy
      - shell: bash
        run: |
          python -m pip install --no-index --find-links dist "r-scikit-learn==${{ inputs.version }}"
          python tests/release_smoke.py

  wheel-install-native:
    name: Install native wheel - Python ${{ matrix.python-version }} / ${{ matrix.os }}
    needs: wheels-native
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.python-version }}
          path: dist
      - run: python -m pip install numpy scipy
      - shell: bash
        run: |
          python -m pip install --no-index --find-links dist "r-scikit-learn==${{ inputs.version }}"
          python tests/release_smoke.py

  sdist-install:
    name: Install sdist - Python ${{ matrix.python-version }}
    needs: sdist
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: source-distribution
          path: dist
      - run: python -m pip install dist/*.tar.gz
      - run: python tests/release_smoke.py

  publish:
    name: Publish to PyPI
    needs: [sdist-install, wheel-install-linux, wheel-install-native]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: "*"
          path: dist
          merge-multiple: true
      - run: python -m pip install "twine==${TWINE_VERSION}" "packaging==${PACKAGING_VERSION}"
      - run: python -m twine check dist/*
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b

  github-release:
    name: Create GitHub release
    needs: [prepare, publish]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: "*"
          path: dist
          merge-multiple: true
      - env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: gh release create "$TAG" dist/* --target "$GITHUB_SHA" --title "$TAG" --generate-notes

  published-install:
    name: Install from PyPI - Python ${{ matrix.python-version }} / ${{ matrix.os }}
    needs: publish
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}
      - shell: bash
        run: |
          for attempt in 1 2 3 4 5; do
            python -m pip install "r-scikit-learn==${{ inputs.version }}" && break
            if [[ "$attempt" = 5 ]]; then exit 1; fi
            sleep 15
          done
          python tests/release_smoke.py
