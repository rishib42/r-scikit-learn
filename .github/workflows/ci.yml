name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Rust quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  python:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: dtolnay/rust-toolchain@stable
      - run: python -m pip install -U pip maturin
      - run: python -m pip install -e ".[dev]"
      - run: ruff check python tests benches
      - run: pytest
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist
      - shell: bash
        run: |
          python -m venv smoke-venv
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            smoke-venv/Scripts/python -m pip install dist/*.whl
            smoke-venv/Scripts/python -c "from rsklearn.preprocessing import StandardScaler"
          else
            smoke-venv/bin/python -m pip install dist/*.whl
            smoke-venv/bin/python -c "from rsklearn.preprocessing import StandardScaler"
          fi
